<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Vehicle - Vehicle Service System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="app-page">
    <header class="app-header">
        <div>
            <p class="eyebrow">Vehicle Owner</p>
            <h1>Add Vehicle</h1>
        </div>
        <nav class="header-actions">
            <a class="btn btn-ghost" href="dashboard.html">Back</a>
            <button class="btn btn-ghost" onclick="logout()">Logout</button>
        </nav>
    </header>
    <div id="appNav"></div>

    <main class="form-page">
        <section class="panel form-panel">
            <div class="section-heading">
                <p class="eyebrow">Vehicle details</p>
                <h2>Register a vehicle</h2>
            </div>

            <form id="addVehicleForm" class="form-grid">
                <label class="field span-2">
                    <span>VIN Number</span>
                    <input type="text" id="vin" placeholder="WVWZZZ3CZ9E000001" required>
                </label>

                <label class="field">
                    <span>Registration Number</span>
                    <input type="text" id="registration" placeholder="KBX 123A" required>
                </label>

                <label class="field">
                    <span>Year Manufactured</span>
                    <input type="number" id="year" min="1950" max="2099" placeholder="2020" required>
                </label>

                <label class="field">
                    <span>Make</span>
                    <input type="text" id="make" placeholder="Toyota" required>
                </label>

                <label class="field">
                    <span>Model</span>
                    <input type="text" id="model" placeholder="Vitz" required>
                </label>

                <div class="form-actions span-2">
                    <button type="submit" class="btn btn-primary">Save Vehicle</button>
                    <a class="btn btn-secondary" href="dashboard.html">Cancel</a>
                </div>
            </form>

            <div class="message" id="message" hidden></div>
        </section>
    </main>

    <script src="js/app.js"></script>
    <script>
        const session = requireAuth(["owner"]);
        if (session) {
            document.getElementById("appNav").innerHTML = appNav("add-vehicle");
        }

        document.getElementById("addVehicleForm").addEventListener("submit", async (event) => {
            event.preventDefault();
            if (!session) return;

            try {
                const data = await apiFetch("/vehicles", {
                    method: "POST",
                    body: JSON.stringify({
                        vin_number: document.getElementById("vin").value.trim(),
                        registration_number: document.getElementById("registration").value.trim(),
                        make: document.getElementById("make").value.trim(),
                        model: document.getElementById("model").value.trim(),
                        year_manufactured: document.getElementById("year").value
                    })
                });

                showMessage("message", data.message || "Vehicle added successfully");
                setTimeout(() => {
                    window.location.href = "owner-dashboard.html";
                }, 900);
            } catch (error) {
                showMessage("message", error.message, "error");
            }
        });
    </script>
</body>
</html>
